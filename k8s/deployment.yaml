apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-worker
  namespace: fcgames
  labels:
    app: notifications-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications-worker
  template:
    metadata:
      labels:
        app: notifications-worker
    spec:
      containers:
      - name: notifications-worker
        image: fcg-notifications-worker:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5004
          name: http
        env:
        - name: ASPNETCORE_URLS
          valueFrom:
            configMapKeyRef:
              name: notifications-worker-config
              key: aspnetcore-urls
        - name: RabbitMQ__Host
          valueFrom:
            configMapKeyRef:
              name: notifications-worker-config
              key: rabbitmq-host
        - name: RabbitMQ__Username
          valueFrom:
            secretKeyRef:
              name: notifications-worker-secret
              key: rabbitmq-username
        - name: RabbitMQ__Password
          valueFrom:
            secretKeyRef:
              name: notifications-worker-secret
              key: rabbitmq-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5004
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
